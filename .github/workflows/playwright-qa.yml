name: Playwright QA - DataDash Table Scraper

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  scrape-and-sum:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm install

      - name: Install Playwright Chromium browser
        run: npx playwright install chromium --with-deps

      - name: "Run Playwright scraper - 24f3003155@ds.study.iitm.ac.in"
        run: node scrape.js
